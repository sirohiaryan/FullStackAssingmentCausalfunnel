<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Northstar — Everyday objects</title><script>window.CausalFunnelTrackerConfig={endpoint:"http://localhost:4000/api/events"}</script><script src="./tracker.js"></script><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;color:#18211f;background:#faf9f6}header{height:68px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 6%;border-bottom:1px solid #e7e5df}header b{font-size:22px}nav{display:flex;gap:24px;font-size:14px}button,input{font:inherit}button{cursor:pointer}.bag{background:#18211f;color:#fff;border:0;padding:10px 14px}.hero{height:470px;background:#d9ddd6;padding:95px 8%;position:relative}.hero small{letter-spacing:2px}.hero h1{font-size:64px;line-height:.95;letter-spacing:-3px;margin:18px 0 28px}.hero button{background:#18211f;color:#fff;border:0;padding:14px 20px}.hero .orb{position:absolute;right:12%;top:75px;width:250px;height:250px;border-radius:50%;background:#b6c0b5}.wrap{max-width:1180px;margin:55px auto;padding:0 24px}.tools{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px}.filters button{background:#fff;border:1px solid #d9d8d2;padding:9px 13px;margin-right:7px}.search{border:1px solid #d9d8d2;padding:10px;width:210px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}.product{background:#fff;border:1px solid #e7e5df;padding:14px}.pic{height:220px;background:#e6e1d8;display:grid;place-items:center;font-size:48px}.product h3{margin:14px 0 5px}.product p{color:#69716e;margin:0 0 14px}.product button{width:100%;background:#fff;border:1px solid #18211f;padding:10px}footer{margin-top:60px;background:#18211f;color:#fff;padding:45px 8%;display:flex;justify-content:space-between}@media(max-width:700px){nav{display:none}.hero h1{font-size:46px}.grid{grid-template-columns:1fr}.tools{align-items:start;gap:14px;flex-direction:column}}</style></head><body><header><b>northstar</b><nav><a>Shop</a><a>New arrivals</a><a>Collections</a><a>Journal</a></nav><button class="bag" id="bag">Bag (0)</button></header><section class="hero"><small>SPRING / SUMMER 2026</small><h1>Objects for<br>everyday use.</h1><button id="shop">Shop collection</button><div class="orb"></div></section><main class="wrap"><div class="tools"><div class="filters"><button>All products</button><button>Home</button><button>Desk</button><button>Travel</button></div><input class="search" placeholder="Search objects"></div><div class="grid"><article class="product"><div class="pic">◒</div><h3>Arc Lamp</h3><p>$84.00</p><button>Add to bag</button></article><article class="product"><div class="pic">◻</div><h3>Field Notebook</h3><p>$18.00</p><button>Add to bag</button></article><article class="product"><div class="pic">◉</div><h3>Orbit Tray</h3><p>$42.00</p><button>Add to bag</button></article></div></main><footer><b>northstar</b><span>Designed for ordinary days.</span></footer><script>let n=0;document.querySelectorAll(".product button").forEach(b=>b.onclick=()=>{n++;document.querySelector("#bag").textContent=`Bag (${n})`;b.textContent="Added"});document.querySelector("#shop").onclick=()=>document.querySelector(".wrap").scrollIntoView({behavior:"smooth"});</script></body></html>
